name: Deploy Registration App

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Deploy Client (Vite)
  # ─────────────────────────────────────────────
  deploy-client:
    name: Build & Deploy Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: public/package.json

      - name: Install dependencies
        working-directory: public
        run: npm install

      - name: Build client
        working-directory: public
        env:
          CI: false
          VITE_SERVERURL: 'https://services.german-emirates-club.com'
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Clear old public files on server
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "rm -rf ~/node/services.german-emirates-club.com/public/* && echo 'Cleared old files'"

      - name: Upload new build to server
        run: |
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} -r public/dist/* \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/node/services.german-emirates-club.com/public/

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "ls -la ~/node/services.german-emirates-club.com/public/"
