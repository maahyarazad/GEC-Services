name: Deploy Registration App

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Deploy Server (Node.js)
  # ─────────────────────────────────────────────
  deploy-server:
    name: Build & Deploy Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload server files
        run: |
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} \
            server.js package.json \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/node/services.german-emirates-club.com/

          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} -r \
            services routes websocket middleware \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/node/services.german-emirates-club.com/

      - name: Install dependencies & restart server
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/node/services.german-emirates-club.com && npm install --omit=dev && sudo systemctl restart pm2-services.german-emirates-club.com.service"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "systemctl list-units | grep 'pm2'"