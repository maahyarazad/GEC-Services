<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>GEC Services</title>

    <!-- ✅ Bootstrap CSS (non-blocking) -->
    <link
      rel="preload"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.7/css/bootstrap.min.css"
      as="style"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.7/css/bootstrap.min.css"
      media="print"
      onload="this.media='all'"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.7/css/bootstrap.min.css"
      />
    </noscript>

    <!-- ✅ Quill CSS (non-blocking) -->
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css"
      as="style"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css"
      />
    </noscript>

    <!-- ✅ Inline critical app CSS if possible -->
    <!-- <link rel="stylesheet" href="/assets/index-CJ3nFqsf.css" /> -->

    <!-- reCAPTCHA is loaded on demand by the Support Portal / Ticket Tracker
         (see src/components/utils/recaptcha.js) — NOT globally, so the badge
         doesn't appear on every page. -->

  </head>

  <body>
    <!-- Accessibility -->
    <main id="root"></main>

    <!-- ✅ Main app entry -->
    <script type="module" src="/src/main.jsx" defer></script>

    <!-- ✅ Bootstrap JS (deferred) -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.7/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
      defer
    ></script>

    <!-- ✅ Lazy-load Mapbox and Quill AFTER render -->
    <script>
      window.addEventListener("load", () => {
        // Mapbox
        const mapboxCss = document.createElement("link");
        mapboxCss.rel = "stylesheet";
        mapboxCss.href =
          "https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css";
        document.head.appendChild(mapboxCss);

        const mapboxScript = document.createElement("script");
        mapboxScript.src =
          "https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js";
        mapboxScript.async = true;
        document.body.appendChild(mapboxScript);

        const geocoderCss = document.createElement("link");
        geocoderCss.rel = "stylesheet";
        geocoderCss.href =
          "https://cdn.jsdelivr.net/npm/@mapbox/mapbox-gl-geocoder@5.1.2/lib/mapbox-gl-geocoder.min.css";
        document.head.appendChild(geocoderCss);

        const geocoderScript = document.createElement("script");
        geocoderScript.src =
          "https://cdn.jsdelivr.net/npm/@mapbox/mapbox-gl-geocoder@5.1.2/dist/mapbox-gl-geocoder.min.js";
        geocoderScript.crossOrigin = "anonymous";
        geocoderScript.async = true;
        document.body.appendChild(geocoderScript);

       
      });
    </script>
  </body>
</html>
